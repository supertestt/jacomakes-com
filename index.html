<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jaco — a small software studio</title>
<meta name="description" content="A small software studio. Maker of Pino and Dawn.">
<link rel="canonical" href="https://jacomakes.com/">
<meta property="og:title" content="Jaco — a small software studio">
<meta property="og:description" content="A small software studio. Maker of Pino and Dawn.">
<meta property="og:url" content="https://jacomakes.com/">
<meta property="og:type" content="website">
<meta name="theme-color" content="#f4f1ea">
<style>
  :root {
    --bg: #f4f1ea;
    --panel: #ffffff;
    --text: #1f1b14;
    --muted: #898070;
    --accent: #a89875;
    --border: #d8d1c2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 16px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 80px 24px 80px; }
  .brand { font-family: ui-serif, "New York", Georgia, serif; font-size: 44px; letter-spacing: -0.02em; margin: 0 0 8px; }
  .tag { color: var(--muted); font-size: 15px; margin: 0 0 56px; }
  .label { text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px; color: var(--muted); margin: 0 0 16px; }
  .grid { display: grid; gap: 14px; }
  a.card { display: block; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 22px 22px; text-decoration: none; color: inherit; transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease; }
  a.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(31,27,20,0.06); border-color: var(--accent); }
  .card-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card-title { font-size: 19px; font-weight: 600; letter-spacing: -0.005em; }
  .arrow { color: var(--muted); font-size: 18px; }
  a.card:hover .arrow { color: var(--accent); }
  .card-desc { color: var(--muted); font-size: 14.5px; margin-top: 4px; }
  footer { margin-top: 72px; color: var(--muted); font-size: 13px; }
  footer a { color: inherit; }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="brand">Jaco</h1>
  <p class="tag">A small software studio. Built quietly, shipped often.</p>

  <p class="label">Things we make</p>
  <div class="grid">
    <a class="card" href="https://pino.so">
      <div class="card-row">
        <div class="card-title">Pino</div>
        <div class="arrow">↗</div>
      </div>
      <div class="card-desc">pino.so</div>
    </a>
    <a class="card" href="/dawn">
      <div class="card-row">
        <div class="card-title">Dawn</div>
        <div class="arrow">→</div>
      </div>
      <div class="card-desc">A daily morning reading habit, kept honest by a photo.</div>
    </a>
  </div>

  <footer>
    <a href="mailto:hello@jacomakes.com">hello@jacomakes.com</a>
  </footer>
</div>
</body>
</html>
